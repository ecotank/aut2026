name: AUT Deployment

on:
  push:
    branches:
      - main


jobs:

  deploy:

    name: Deploy AUT

    runs-on: ubuntu-latest


    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Create Docker network
      run: |
        docker network create isolated


    - name: Build AUT Image
      run: |
        docker build -t aut2026 .


    - name: Run AUT Container
      run: |
        docker run -d \
        --network=isolated \
        -p 8081:80 \
        --name aut-container \
        aut2026

    - name: Deploy Selenium
      run: |
        docker run -d \
          --network=isolated \
          -p 4444:4444 \
          --name selenium \
          selenium/standalone-firefox

    - name: Wait Selenium
      run: |
        ./wait.sh

    - name: Install Selenium Python
      run: |
        pip install selenium

    - name: Run Selenium Test
      run: |
        python tests/hello_aut.py      
      
    - name: Upload Screenshot Artifact
      uses: actions/upload-artifact@v4
      with:
        name: selenium-screenshot
        path: screenshot.png